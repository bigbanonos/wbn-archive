<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="generator" content="WBN 2026">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 World Baseball Classic Schedule — Classic Baseball World</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    /* ── Matches classicbaseball.world exactly ── */
    :root {
      --bg:      #0f172a;
      --card:    #1e293b;
      --text:    #f8fafc;
      --muted:   #94a3b8;
      --accent:  #D50032; /* WBC red */
      --neon:    #00ff9d; /* site neon green */
      --gold:    #f59e0b;
      --rule:    #334155;
      --exh:     #818cf8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }

    a { text-decoration: none; color: inherit; }

    /* ── TOP NAV — matches site ── */
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 16px;
      margin-bottom: 40px;
    }

    .hq-link {
      color: var(--neon);
      border: 1px solid var(--neon);
      padding: 8px 16px;
      border-radius: 4px;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: background 0.2s;
    }

    .hq-link:hover { background: rgba(0,255,157,0.1); }

    .nav-archive-link {
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .nav-archive-link:hover { color: var(--text); }

    /* ── DASHBOARD WRAPPER ── */
    .dashboard-wrapper {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      margin-bottom: 40px;
    }

    .main-title {
      font-size: 3rem;
      font-weight: 900;
      margin: 0;
      letter-spacing: -2px;
    }

    .sub-title {
      color: var(--muted);
      font-size: 1rem;
      margin-top: 10px;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 20px;
      font-family: monospace;
      color: var(--muted);
    }

    .stat-num { color: var(--accent); font-weight: bold; font-size: 1.2rem; }

    /* ── CONTROLS / TABS ── */
    .controls { margin-bottom: 30px; text-align: center; }

    .tab-row {
      display: flex;
      justify-content: center;
      gap: 0;
      border: 1px solid var(--rule);
      border-radius: 6px;
      overflow: hidden;
      display: inline-flex;
      margin-bottom: 16px;
    }

    .tab-btn {
      background: none;
      border: none;
      border-right: 1px solid var(--rule);
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .tab-btn:last-child { border-right: none; }
    .tab-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .tab-btn.active { background: var(--accent); color: #fff; }
    .tab-btn.active.exh { background: var(--exh); }

    /* filter pills (tournament tab) */
    .filter-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--rule);
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--muted); color: var(--text); }
    .filter-btn.active { border-color: var(--neon); color: var(--neon); background: rgba(0,255,157,0.07); }

    /* ── PANELS ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── STANDINGS ── */
    .standings-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 40px;
    }

    .standings-card {
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: 8px;
      padding: 14px;
    }

    .sc-header {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--neon);
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
    }

    .sc-venue { color: var(--muted); font-weight: 400; }

    .sc-row {
      display: grid;
      grid-template-columns: 16px 1fr 22px 22px;
      gap: 4px;
      align-items: center;
      padding: 4px 0;
      font-size: 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .sc-row:last-child { border-bottom: none; }
    .sc-pos { color: var(--muted); font-size: 0.65rem; font-family: monospace; }
    .sc-team { font-weight: 700; display: flex; align-items: center; gap: 4px; }
    .sc-w { text-align: center; color: #4ade80; font-weight: 700; font-family: monospace; font-size: 0.75rem; }
    .sc-l { text-align: center; color: #f87171; font-weight: 700; font-family: monospace; font-size: 0.75rem; }
    .sc-hdr { color: var(--muted); font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; }

    /* ── POOL SECTIONS ── */
    .pool-section { margin-bottom: 48px; }

    .pool-heading {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--rule);
    }

    .pool-title {
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .pool-venue-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .pool-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      flex-shrink: 0;
    }

    /* ── GAME ROW ── */
    .game-row {
      display: grid;
      grid-template-columns: 80px 1fr 110px 90px;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.12s;
      cursor: default;
    }

    .game-row:hover { background: rgba(255,255,255,0.03); }
    .game-row.is-live { background: rgba(0,255,157,0.03); }
    .game-row:last-child { border-bottom: none; }

    .g-date-main { font-size: 0.85rem; font-weight: 700; color: var(--text); }
    .g-date-day  { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 1px; }

    .g-teams { display: flex; align-items: center; gap: 8px; }
    .g-team  { display: flex; align-items: center; gap: 5px; }
    .g-flag  { font-size: 1.1rem; line-height: 1; }
    .g-code  { font-size: 0.95rem; font-weight: 900; letter-spacing: 0.03em; }
    .g-name  { font-size: 0.6rem; color: var(--muted); margin-top: 1px; }
    .g-vs    { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em; color: #475569; flex-shrink: 0; }

    .g-score-box {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 4px;
      padding: 4px 10px;
      justify-content: center;
    }

    .g-score-num { font-size: 1.1rem; font-weight: 900; color: var(--gold); font-family: monospace; min-width: 14px; text-align: center; }
    .g-score-sep { color: rgba(245,158,11,0.4); font-size: 0.8rem; }
    .g-time-val  { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-align: center; font-family: monospace; }

    .g-status { display: flex; align-items: center; justify-content: flex-end; }

    .pill {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .pill-live  { background: rgba(0,255,157,0.15); color: var(--neon); border: 1px solid rgba(0,255,157,0.35); animation: glow 1.4s ease infinite; }
    .pill-final { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--rule); }
    .pill-sched { background: rgba(99,149,255,0.08); color: #7aadff; border: 1px solid rgba(99,149,255,0.2); }
    .pill-tbd   { background: transparent; color: #475569; border: 1px solid var(--rule); }
    .pill-exh   { background: rgba(129,140,248,0.1); color: var(--exh); border: 1px solid rgba(129,140,248,0.25); }

    @keyframes glow {
      0%,100% { opacity:1; box-shadow: 0 0 6px rgba(0,255,157,0.3); }
      50%      { opacity:0.5; box-shadow: none; }
    }

    .inn { font-size: 0.65rem; font-weight: 700; color: var(--neon); margin-left: 4px; font-family: monospace; }

    /* ── BRACKET ── */
    .bracket-wrap {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--rule);
      border: 1px solid var(--rule);
      border-radius: 8px;
      overflow: hidden;
    }

    .bracket-col {
      background: var(--card);
      padding: 20px 16px;
    }

    .bracket-col-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--rule);
    }

    .b-game {
      background: var(--bg);
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }

    .b-meta {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .b-meta.champ { color: var(--gold); }

    .b-tbd-label {
      font-size: 0.75rem;
      color: #475569;
      font-style: italic;
      text-align: center;
      padding: 6px 0;
    }

    .b-matchup { display: flex; flex-direction: column; gap: 4px; }

    .b-team {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .b-team-info { display: flex; align-items: center; gap: 5px; }
    .b-score { font-family: monospace; font-size: 1rem; font-weight: 900; color: var(--gold); }

    .b-divider {
      height: 1px;
      background: var(--rule);
      margin: 1px 0;
      position: relative;
    }

    .b-divider::after {
      content: 'vs';
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%,-50%);
      background: var(--bg);
      padding: 0 5px;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #475569;
      text-transform: uppercase;
    }

    .champ-game {
      background: linear-gradient(135deg, #1a0800, #0f172a);
      border-color: rgba(245,158,11,0.3) !important;
    }

    /* ── EXHIBITION PANEL ── */
    .exh-day { margin-bottom: 48px; }

    .exh-day-heading {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--rule);
    }

    .exh-day-title {
      font-size: 1.3rem;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .exh-badge {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--exh);
      border: 1px solid rgba(129,140,248,0.3);
      padding: 2px 8px;
      border-radius: 3px;
    }

    .exh-note {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 16px;
      padding: 6px 10px;
      background: rgba(129,140,248,0.05);
      border: 1px solid rgba(129,140,248,0.12);
      border-radius: 4px;
      display: inline-block;
    }

    .exh-row {
      display: grid;
      grid-template-columns: 90px 1fr 180px 80px;
      align-items: center;
      gap: 12px;
      padding: 9px 12px;
      border-radius: 5px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.12s;
      cursor: default;
    }

    .exh-row:hover { background: rgba(255,255,255,0.025); }
    .exh-row:last-child { border-bottom: none; }

    .exh-time { font-size: 0.8rem; font-weight: 700; color: var(--text); font-family: monospace; }
    .exh-tz   { font-size: 0.6rem; color: var(--muted); margin-top: 1px; }

    .exh-matchup { display: flex; align-items: center; gap: 8px; }
    .exh-wbc  { display: flex; align-items: center; gap: 5px; }
    .exh-flag { font-size: 1rem; }
    .exh-code { font-size: 0.9rem; font-weight: 900; }
    .exh-name { font-size: 0.6rem; color: var(--muted); margin-top: 1px; }
    .exh-at   { font-size: 0.65rem; font-weight: 700; color: #475569; letter-spacing: 0.1em; }
    .exh-mlb  { display: flex; align-items: center; gap: 5px; }
    .exh-mlb-code { font-size: 0.9rem; font-weight: 700; color: var(--muted); }
    .exh-mlb-name { font-size: 0.6rem; color: #475569; margin-top: 1px; }

    .exh-venue { }
    .exh-venue-name { font-size: 0.72rem; font-weight: 600; color: var(--muted); }
    .exh-venue-city { font-size: 0.6rem; color: #475569; margin-top: 1px; }

    .exh-tv { text-align: right; }
    .tv-pill {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
      background: rgba(129,140,248,0.1);
      color: var(--exh);
      border: 1px solid rgba(129,140,248,0.2);
    }

    /* ── FOOTER ── */
    .site-footer {
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--muted);
      flex-wrap: wrap;
      gap: 10px;
    }

    .footer-links { display: flex; gap: 20px; }
    .footer-links a { color: var(--muted); transition: color 0.15s; }
    .footer-links a:hover { color: var(--neon); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .standings-grid { grid-template-columns: repeat(2, 1fr); }
      .bracket-wrap { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      body { padding: 12px; }
      .game-row { grid-template-columns: 64px 1fr 70px; }
      .g-status { display: none; }
      .exh-row { grid-template-columns: 72px 1fr 100px; }
      .exh-tv { display: none; }
      .standings-grid { grid-template-columns: 1fr 1fr; }
      .main-title { font-size: 2rem; }
    }
  </style>
</head>

<div class="dashboard-wrapper">

  <!-- TOP NAV -->

  <!-- FOOTER -->

      <a href="https://classicbaseball.world">The Archive</a>

      {date:'Mar 7', day:'Sat', time:'11:00a', road:{code:'COL',flag:'🇨🇴',name:'Colombia'},    home:{code:'CAN',flag:'🇨🇦',name:'Canada'},           status:'sched'},

      {date:'Mar 8', day:'Sun', time:'6:00p',  road:{code:'COL',flag:'🇨🇴',name:'Colombia'},    home:{code:'CUB',flag:'🇨🇺',name:'Cuba'},             status:'sched'},

      {date:'Mar 9', day:'Mon', time:'7:00p',  road:{code:'CUB',flag:'🇨🇺',name:'Cuba'},        home:{code:'PUR',flag:'🇵🇷',name:'Puerto Rico'},      status:'sched'},
      {date:'Mar 10',day:'Tue', time:'7:00p',  road:{code:'CAN',flag:'🇨🇦',name:'Canada'},      home:{code:'PUR',flag:'🇵🇷',name:'Puerto Rico'},      status:'sched'},

  B:{
    name:'Pool B', venue:'Daikin Park', city:'Houston, TX', color:'#fb923c',

/* ═══ RENDER HELPERS ═══ */
function pill(g) {
  if(g.status==='live')  return '<span class="pill pill-live">Live</span>'+(g.inning?'<span class="inn">'+g.inning+'</span>':'');
  if(g.status==='final') return '<span class="pill pill-final">Final</span>';
  if(g.status==='tbd')   return '<span class="pill pill-tbd">TBD</span>';
  return '<span class="pill pill-sched">'+g.time+' ET</span>';
}

function scoreOrTime(g) {
  var hs=(g.status==='live'||g.status==='final')&&g.roadScore!==undefined;
  if(hs) return '<div class="g-score-box"><span class="g-score-num">'+g.roadScore+'</span><span class="g-score-sep">–</span><span class="g-score-num">'+g.homeScore+'</span></div>';
  return '<div class="g-time-val">'+g.time+' ET</div>';
}

function renderGameRow(g) {
  return '<div class="game-row'+(g.status==='live'?' is-live':'')+'">'
    +'<div><div class="g-date-main">'+g.date+'</div><div class="g-date-day">'+g.day+'</div></div>'
    +'<div class="g-teams">'
    +'<div class="g-team"><span class="g-flag">'+g.road.flag+'</span><div><div class="g-code">'+g.road.code+'</div><div class="g-name">'+g.road.name+'</div></div></div>'
    +'<span class="g-vs">VS</span>'
    +'<div class="g-team"><span class="g-flag">'+g.home.flag+'</span><div><div class="g-code">'+g.home.code+'</div><div class="g-name">'+g.home.name+'</div></div></div>'
    +'</div>'
    +scoreOrTime(g)
    +'<div class="g-status">'+pill(g)+'</div>'
    +'</div>';
}

/* ═══ RENDER STANDINGS ═══ */
function renderStandings() {
  var el=document.getElementById('standingsGrid');
  var html='';
  ['A','B','C','D'].forEach(function(k){
    var p=POOLS[k];
    var sorted=p.teams.slice().sort(function(a,b){return(b.w-b.l)-(a.w-a.l);});
    html+='<div class="standings-card">'
      +'<div class="sc-header" style="color:'+p.color+'">Pool '+k+' <span class="sc-venue">'+p.city+'</span></div>'
      +'<div class="sc-row"><span class="sc-pos sc-hdr">#</span><span class="sc-team sc-hdr">Team</span><span class="sc-w sc-hdr">W</span><span class="sc-l sc-hdr">L</span></div>';
    sorted.forEach(function(t,i){
      html+='<div class="sc-row"><span class="sc-pos">'+(i+1)+'</span><span class="sc-team">'+t.flag+' '+t.code+'</span><span class="sc-w">'+t.w+'</span><span class="sc-l">'+t.l+'</span></div>';
    });
    html+='</div>';
  });
  el.innerHTML=html;
}

    html+='<div class="bracket-col"><div class="bracket-col-label">'+round.round+' · '+round.date+' · '+round.venue+'</div>';

/* ═══ TABS ═══ */
function switchTab(tab) {
  ['tournament','exhibition'].forEach(function(t){
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('panel-'+t).classList.toggle('active', t===tab);
  });
  document.getElementById('filterRow').style.display = tab==='tournament' ? '' : 'none';
}

/* ═══ FILTER ═══ */
function filterPool(pool) {
  document.querySelectorAll('.filter-btn').forEach(function(b){
    b.classList.toggle('active', (b.getAttribute('onclick')||'').indexOf("'"+pool+"'")!==-1);
  });
  document.querySelectorAll('[data-pool]').forEach(function(s){
    var sp=s.getAttribute('data-pool');
    if(pool==='ALL') s.style.display='';
    else if(pool==='BRACKET') s.style.display=sp==='BRACKET'?'':'none';
    else s.style.display=sp===pool?'':'none';
  });
  document.getElementById('standingsWrap').style.display=pool==='BRACKET'?'none':'';
}

// Init
renderStandings();
renderSchedule();
renderExhibition();
</script>
</body>
